<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zestlie | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: #070a12;
  color: #e5e7eb;
}

/* ================= BACKGROUND ================= */

/* animated gradient */
.bg-gradient {
  position: absolute;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(circle at 20% 30%, #1e293b, transparent 40%),
    radial-gradient(circle at 80% 70%, #111827, transparent 40%),
    radial-gradient(circle at 50% 50%, #020617, #000);
  animation: bgMove 30s ease-in-out infinite alternate;
  z-index: -3;
}

@keyframes bgMove {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(-80px,-80px) scale(1.1); }
}

/* floating blobs */
.blob {
  position: absolute;
  width: 400px;
  height: 400px;
  filter: blur(120px);
  opacity: 0.25;
  border-radius: 50%;
  animation: float 12s infinite ease-in-out alternate;
}

.blob1 { background: #6366f1; top: 10%; left: 15%; }
.blob2 { background: #22d3ee; bottom: 10%; right: 15%; }

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-60px); }
}

/* mouse glow */
.glow {
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(99,102,241,0.12), transparent 60%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: -1;
}

/* ================= CONTENT ================= */

.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 14px;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 3.2rem;
  font-weight: 600;
  letter-spacing: 2px;
  animation: fadeUp 1s ease forwards;
}

p {
  opacity: 0.6;
  margin-bottom: 35px;
  animation: fadeUp 1.5s ease forwards;
}

/* ================= INPUT ================= */

.form {
  position: relative;
  display: flex;
  width: 100%;
  max-width: 420px;
  border-radius: 999px;
  padding: 6px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
}

/* shimmer (fixed) */
.form::before {
  content: "";
  position: absolute;
  top: 0;
  left: -60%;
  width: 40%;
  height: 100%;
  background: linear-gradient(
    110deg,
    transparent,
    rgba(255,255,255,0.12),
    transparent
  );
  transform: skewX(-20deg);
  animation: shimmer 5s infinite;
}

@keyframes shimmer {
  0% { left: -60%; }
  100% { left: 120%; }
}

.form:focus-within::before {
  opacity: 0;
  animation: none;
}

.form input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  padding: 12px 15px;
  z-index: 1;
}

.form input::placeholder {
  color: rgba(255,255,255,0.4);
}

/* button */
.form button {
  border: none;
  padding: 10px 22px;
  border-radius: 999px;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color: white;
  cursor: pointer;
  transition: 0.25s;
  z-index: 1;
}

.form button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 18px rgba(99,102,241,0.4);
}

.form button:active {
  transform: scale(0.96);
}

/* ================= FOOTER ================= */

.footer {
  position: absolute;
  bottom: 20px;
  font-size: 0.75rem;
  opacity: 0.4;
}

/* ================= TOAST ================= */

.toast {
  position: fixed;
  bottom: 30px;
  background: rgba(20,20,30,0.9);
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  font-size: 0.9rem;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

/* ================= ANIMATION ================= */

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* mobile */
@media(max-width: 500px) {
  h1 { font-size: 2.3rem; }
}
</style>
</head>

<body>

<div class="bg-gradient"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="glow" id="glow"></div>

<div class="container">
  <h1>Zestlie</h1>
  <p>Crafted with intention. Launching soon.</p>

  <form class="form" id="form">
    <input type="email" name="email" placeholder="Enter your email" required>
    <button type="submit">Notify</button>
  </form>

  <p style="font-size:0.8rem; opacity:0.5;">
    info@zestlie.com
  </p>
</div>

<div class="footer">
  © 2026 Zestlie. All rights reserved.
</div>

<div class="toast" id="toast"></div>

<script>
// mouse glow
document.addEventListener("mousemove", e => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

// form submit
const form = document.getElementById("form");
const toast = document.getElementById("toast");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = new FormData(form);

  try {
    await fetch("https://formspree.io/f/mpqbpdab", {
      method: "POST",
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    toast.innerText = "You're on the list ✨";
    toast.classList.add("show");
    form.reset();
  } catch {
    toast.innerText = "Something went wrong. Try again.";
    toast.classList.add("show");
  }

  setTimeout(() => toast.classList.remove("show"), 3000);
});
</script>

</body>
</html>
