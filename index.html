<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zestlie — Arriving Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617 70%);
  color: #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

/* subtle animated glow */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%);
  animation: float 10s ease-in-out infinite alternate;
}

@keyframes float {
  from { transform: translate(-100px, -80px); }
  to { transform: translate(100px, 80px); }
}

.container {
  width: 100%;
  max-width: 520px;
  text-align: center;
  z-index: 1;
}

h1 {
  font-size: clamp(2.5rem, 5vw, 3.5rem);
  font-weight: 600;
  letter-spacing: 1px;
}

.tagline {
  margin-top: 12px;
  font-size: 1rem;
  color: #94a3b8;
  line-height: 1.6;
}

.form {
  margin-top: 40px;
  display: flex;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
}

input {
  flex: 1;
  padding: 14px 18px;
  border: none;
  background: transparent;
  color: white;
  font-size: 0.95rem;
  outline: none;
}

input::placeholder {
  color: #64748b;
}

button {
  position: relative;
  padding: 14px 22px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-weight: 500;
  overflow: hidden;
  transition: all 0.3s ease;
}

/* hover glow */
button:hover {
  box-shadow: 0 0 20px rgba(99,102,241,0.4);
}

/* ripple animation */
button::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  top: 50%;
  left: 50%;
  opacity: 0;
}

button:active::after {
  width: 200px;
  height: 200px;
  opacity: 1;
  transition: width 0.4s ease, height 0.4s ease, opacity 0.6s;
}

/* loading spinner */
.loading {
  pointer-events: none;
}

.loading span {
  opacity: 0;
}

.loading::before {
  content: "";
  width: 16px;
  height: 16px;
  border: 2px solid white;
  border-top-color: transparent;
  border-radius: 50%;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.success {
  margin-top: 20px;
  font-size: 0.95rem;
  color: #c4b5fd;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.5s ease;
}

.success.show {
  opacity: 1;
  transform: translateY(0);
}

/* responsive stacking on small devices */
@media (max-width: 480px) {
  .form {
    flex-direction: column;
    border-radius: 20px;
  }

  button {
    width: 100%;
  }
}

footer {
  position: fixed;
  bottom: 15px;
  font-size: 0.8rem;
  color: #64748b;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>Zestlie</h1>

  <p class="tagline">
    Designed with intention. Built to feel effortless.
  </p>

  <form id="form" class="form" action="https://formspree.io/f/mpqbpdab" method="POST">
    <input type="email" name="email" placeholder="Your email address" required>
    <button id="btn"><span>Get Early Access</span></button>
  </form>

  <div id="success" class="success">
    You're on the list. We’ll let you in first.
  </div>
</div>

<footer>
  © 2026 Zestlie — Crafted with intent.
</footer>

<script>
const form = document.getElementById('form');
const btn = document.getElementById('btn');
const success = document.getElementById('success');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  btn.classList.add('loading');

  const data = new FormData(form);

  try {
    const res = await fetch(form.action, {
      method: form.method,
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    if (res.ok) {
      form.reset();
      btn.classList.remove('loading');
      btn.innerHTML = "<span>Reserved</span>";
      success.classList.add('show');
    } else {
      throw new Error();
    }

  } catch {
    btn.classList.remove('loading');
    btn.innerHTML = "<span>Try Again</span>";
  }
});
</script>

</body>
</html>
