<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zestlie — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

    body {
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      overflow:hidden;
      background:#020617;
    }

    /* Gradient base */
    .bg-gradient {
      position:absolute;
      inset:-50%;
      background: linear-gradient(120deg, #38bdf8, #6366f1, #22d3ee, #818cf8);
      background-size: 300% 300%;
      filter: blur(120px);
      opacity:0.35;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating particles */
    .particles span {
      position:absolute;
      display:block;
      width:6px;
      height:6px;
      background:#38bdf8;
      border-radius:50%;
      opacity:0.6;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh) scale(0.5); opacity:0; }
      30% { opacity:0.6; }
      to { transform: translateY(-10vh) scale(1); opacity:0; }
    }

    /* Cursor glow */
    .cursor-glow {
      position:absolute;
      width:400px;
      height:400px;
      background: radial-gradient(circle, rgba(56,189,248,0.2), transparent 60%);
      pointer-events:none;
      transform: translate(-50%, -50%);
      z-index:1;
    }

    .container {
      position:relative;
      text-align:center;
      max-width:700px;
      padding:40px 20px;
      z-index:2;
    }

    .logo {
      font-size:1.2rem;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#38bdf8;
      margin-bottom:20px;
      animation: fadeIn 1s ease;
    }

    h1 {
      font-size:3.5rem;
      font-weight:700;
      margin-bottom:15px;
      background: linear-gradient(90deg,#38bdf8,#818cf8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation: fadeInUp 1.2s ease;
    }

    p {
      color:#cbd5f5;
      font-size:1.1rem;
      margin-bottom:35px;
      animation: fadeInUp 1.6s ease;
    }

    .email-box {
      display:flex;
      justify-content:center;
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:50px;
      padding:5px;
      max-width:420px;
      margin:0 auto;
      animation: fadeInUp 2s ease;
    }

    input {
      flex:1;
      padding:14px 18px;
      border:none;
      outline:none;
      background:transparent;
      color:white;
      font-size:0.95rem;
    }

    button {
      padding:12px 20px;
      border:none;
      border-radius:40px;
      background: linear-gradient(90deg,#38bdf8,#6366f1);
      color:white;
      font-weight:600;
      cursor:pointer;
      transition: all 0.25s ease;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(56,189,248,0.7);
    }

    .success-message {
      display:none;
      margin-top:20px;
      color:#38bdf8;
      font-size:0.95rem;
    }

    .footer {
      margin-top:50px;
      font-size:0.8rem;
      color:#64748b;
      line-height:1.6;
      animation: fadeIn 2.5s ease;
    }

    @keyframes fadeIn {
      from { opacity:0; }
      to { opacity:1; }
    }

    @keyframes fadeInUp {
      from { opacity:0; transform: translateY(15px); }
      to { opacity:1; transform: translateY(0); }
    }

    @media (max-width:500px) {
      h1 { font-size:2.4rem; }
      .email-box { flex-direction:column; }
      button { width:100%; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <div class="particles" id="particles"></div>
  <div class="cursor-glow" id="glow"></div>

  <div class="container">
    <div class="logo">ZESTLIE</div>
    <h1>Something Fresh is Coming</h1>
    <p>Stay for a second… something cool is happening 👀</p>

    <form class="email-box" id="form">
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit">Notify Me</button>
    </form>

    <div class="success-message" id="successMsg">🚀 You're on the list!</div>

    <div class="footer">
      © <span id="year"></span> Zestlie
    </div>
  </div>

  <script>
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });

    // particles
    const particlesContainer = document.getElementById('particles');
    for(let i=0;i<40;i++){
      const span = document.createElement('span');
      span.style.left = Math.random()*100 + 'vw';
      span.style.animationDuration = (5 + Math.random()*10) + 's';
      span.style.animationDelay = Math.random()*5 + 's';
      particlesContainer.appendChild(span);
    }

    const form = document.getElementById('form');
    const successMsg = document.getElementById('successMsg');
    const year = document.getElementById('year');

    year.textContent = new Date().getFullYear();

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);

      try {
        const response = await fetch('https://formspree.io/f/mpqbpdab', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.style.display = 'none';
          successMsg.style.display = 'block';
        } else {
          alert('Try again');
        }
      } catch (error) {
        alert('Error');
      }
    });
  </script>
</body>
</html>
