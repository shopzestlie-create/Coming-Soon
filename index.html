<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zestlie — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

    body {
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color:white;
      overflow:hidden;
    }

    .bg-glow {
      position:absolute;
      width:600px;
      height:600px;
      background: radial-gradient(circle, rgba(56,189,248,0.25), transparent 70%);
      top:-100px;
      right:-100px;
      filter: blur(80px);
    }

    .container {
      text-align:center;
      max-width:700px;
      padding:40px 20px;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size:1.3rem;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#38bdf8;
      margin-bottom:20px;
    }

    h1 {
      font-size:3.5rem;
      font-weight:700;
      margin-bottom:15px;
      background: linear-gradient(90deg,#38bdf8,#818cf8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p {
      color:#cbd5f5;
      font-size:1.1rem;
      margin-bottom:35px;
    }

    .email-box {
      display:flex;
      justify-content:center;
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:50px;
      padding:5px;
      max-width:420px;
      margin:0 auto;
    }

    input {
      flex:1;
      padding:14px 18px;
      border:none;
      outline:none;
      background:transparent;
      color:white;
      font-size:0.95rem;
    }

    input::placeholder { color:#94a3b8; }

    button {
      padding:12px 20px;
      border:none;
      border-radius:40px;
      background: linear-gradient(90deg,#38bdf8,#6366f1);
      color:white;
      font-weight:600;
      cursor:pointer;
      transition: all 0.25s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(56,189,248,0.6);
    }

    .success-message {
      display:none;
      margin-top:20px;
      color:#38bdf8;
      font-size:0.95rem;
    }

    .footer {
      margin-top:50px;
      font-size:0.8rem;
      color:#64748b;
      line-height:1.6;
    }

    .footer span {
      color:#94a3b8;
    }

    @media (max-width:500px) {
      h1 { font-size:2.4rem; }
      .email-box { flex-direction:column; border-radius:20px; }
      button { width:100%; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="logo">ZESTLIE</div>
    <h1>Something Fresh is Coming</h1>
    <p>We’re crafting a modern experience for you. Be the first to know when we launch.</p>

    <form class="email-box" id="form">
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit">Notify Me</button>
    </form>

    <div class="success-message" id="successMsg">🚀 You're on the list! We'll notify you.</div>

    <div class="footer">
      © <span id="year"></span> Zestlie. All rights reserved.<br>
      <span>Built with care. Launching soon.</span>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const successMsg = document.getElementById('successMsg');
    const year = document.getElementById('year');

    year.textContent = new Date().getFullYear();

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const data = new FormData(form);

      try {
        const response = await fetch('https://formspree.io/f/mpqbpdab', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.style.display = 'none';
          successMsg.style.display = 'block';
        } else {
          alert('Something went wrong. Try again.');
        }
      } catch (error) {
        alert('Error submitting form.');
      }
    });
  </script>
</body>
</html>
