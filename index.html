<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zestlie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#06050A;
  color:#E8E0D0;
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
}

/* ── CANVAS ── */
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── GRAIN ── */
body::before{
  content:'';position:fixed;inset:0;z-index:2;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  opacity:0.038;
}

/* ── SCENE ── */
.scene{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;
  text-align:center;
  padding:2rem 1.5rem;
  width:100%;
}

/* ── TOP ORNAMENT ── */
.ornament{
  display:flex;align-items:center;gap:12px;
  margin-bottom:3rem;
  opacity:0;animation:up 1s 0.2s forwards;
}
.orn-line{
  width:48px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,180,132,0.4));
}
.orn-line.r{
  background:linear-gradient(90deg,rgba(212,180,132,0.4),transparent);
}
.orn-text{
  font-family:'DM Sans',sans-serif;
  font-size:9px;letter-spacing:0.35em;
  text-transform:uppercase;
  color:rgba(212,180,132,0.5);
  font-weight:300;
}

/* ── WORDMARK ── */
.wordmark-clip{overflow:hidden;margin-bottom:0.6rem;}
.wordmark{
  font-family:'Cormorant',serif;
  font-size:clamp(5rem,16vw,11rem);
  font-weight:300;
  letter-spacing:-0.02em;
  line-height:1;
  color:#F0E8D8;
  display:block;
  transform:translateY(108%);
  animation:lift 1.2s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
}
.wordmark em{
  font-style:italic;
  color:transparent;
  -webkit-text-stroke:1px rgba(212,180,132,0.55);
}

/* ── TAGLINE ── */
.tagline-clip{overflow:hidden;margin-bottom:2.8rem;}
.tagline{
  font-family:'Cormorant',serif;
  font-size:clamp(0.85rem,2.5vw,1.1rem);
  font-weight:300;
  font-style:italic;
  letter-spacing:0.12em;
  color:rgba(212,180,132,0.55);
  display:block;
  transform:translateY(120%);
  animation:lift 1s 0.65s cubic-bezier(0.16,1,0.3,1) forwards;
}

/* ── FORM ── */
.form-shell{
  width:min(360px,100%);
  opacity:0;animation:up 1s 1s forwards;
}

/* Gold border wrapper with corner accents */
.form-border{
  position:relative;
  padding:1px;
  border-radius:4px;
  background:linear-gradient(135deg,
    rgba(212,180,132,0.5) 0%,
    rgba(212,180,132,0.1) 40%,
    rgba(212,180,132,0.1) 60%,
    rgba(212,180,132,0.4) 100%
  );
  margin-bottom:1px;
}
/* shimmer sweep on border */
.form-border::after{
  content:'';position:absolute;inset:0;border-radius:4px;
  background:linear-gradient(105deg,
    transparent 30%,
    rgba(212,180,132,0.25) 50%,
    transparent 70%
  );
  background-size:200% 100%;
  animation:borderShimmer 3.5s ease-in-out infinite;
  pointer-events:none;
}

.form-inner{
  display:flex;
  border-radius:3px;
  background:rgba(12,10,18,0.92);
  backdrop-filter:blur(20px);
  overflow:hidden;
}

.ei{
  flex:1;padding:16px 20px;
  background:transparent;border:none;outline:none;
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:300;
  color:#E8E0D0;
  letter-spacing:0.04em;
  min-width:0;
}
.ei::placeholder{
  color:rgba(212,180,132,0.25);
  font-style:italic;
  letter-spacing:0.08em;
}
/* prevent iOS zoom */
@media(max-width:480px){.ei{font-size:16px;}}

/* Divider between input and button */
.form-divider{
  width:1px;
  background:linear-gradient(180deg,transparent,rgba(212,180,132,0.25),transparent);
  margin:10px 0;
  flex-shrink:0;
}

/* NOTIFY BUTTON */
.nb{
  position:relative;
  padding:16px 22px;
  background:transparent;
  border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:300;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:rgba(212,180,132,0.75);
  white-space:nowrap;
  overflow:hidden;
  transition:color 0.4s;
  flex-shrink:0;
}
/* shimmer on button */
.nb::before{
  content:'';
  position:absolute;top:0;left:-120%;
  width:60%;height:100%;
  background:linear-gradient(90deg,
    transparent,
    rgba(212,180,132,0.18),
    transparent
  );
  animation:btnShimmer 2.5s ease-in-out infinite;
  pointer-events:none;
}
/* subtle fill on hover */
.nb::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(212,180,132,0.06);
  opacity:0;transition:opacity 0.35s;
}
.nb:hover{color:rgba(212,180,132,1);}
.nb:hover::after{opacity:1;}
.nb:active{transform:scale(0.98);}
.nb span{position:relative;z-index:1;}

/* PULSE RINGS around entire form */
.pulse-ring{
  position:absolute;inset:-6px;border-radius:6px;
  border:1px solid rgba(212,180,132,0.1);
  animation:pulse 3s ease-in-out infinite;
  pointer-events:none;
}
.pulse-ring-2{
  position:absolute;inset:-12px;border-radius:8px;
  border:1px solid rgba(212,180,132,0.05);
  animation:pulse 3s 0.8s ease-in-out infinite;
  pointer-events:none;
}
.form-positioner{position:relative;width:min(360px,100%);}

/* SUCCESS */
.ok{
  display:none;
  font-family:'Cormorant',serif;
  font-size:1rem;font-style:italic;
  letter-spacing:0.12em;
  color:rgba(212,180,132,0.6);
  padding:16px 0;
  text-align:center;
}
.ok.show{display:block;}

/* HINT */
.hint{
  margin-top:14px;
  font-family:'DM Sans',sans-serif;
  font-size:9px;letter-spacing:0.22em;
  text-transform:uppercase;
  color:rgba(212,180,132,0.2);
  opacity:0;animation:up 1s 1.3s forwards;
}

/* ── BOTTOM ORNAMENT ── */
.bottom{
  position:fixed;bottom:0;left:0;right:0;
  z-index:20;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:1.6rem;
  gap:10px;
  pointer-events:none;
  opacity:0;animation:up 1s 1.5s forwards;
}
.bottom-line{
  width:1px;height:28px;
  background:linear-gradient(180deg,transparent,rgba(212,180,132,0.2));
}
.copyright{
  font-family:'DM Sans',sans-serif;
  font-size:9px;letter-spacing:0.25em;
  text-transform:uppercase;
  color:rgba(212,180,132,0.2);
}

/* ── NAV DOT ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:1.4rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  opacity:0;animation:up 0.8s 0.1s forwards;
}
.nav-logo{
  font-family:'Cormorant',serif;
  font-size:1rem;font-weight:300;letter-spacing:0.2em;
  color:rgba(212,180,132,0.45);
  text-transform:uppercase;
}
.nav-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(212,180,132,0.4);
  box-shadow:0 0 10px rgba(212,180,132,0.3);
  animation:dotPulse 2.5s ease-in-out infinite;
}

/* ── KEYFRAMES ── */
@keyframes up{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes lift{to{transform:translateY(0);}}
@keyframes borderShimmer{
  0%{background-position:200% 0;}
  50%{background-position:-200% 0;}
  100%{background-position:200% 0;}
}
@keyframes btnShimmer{
  0%{left:-120%;}
  55%,100%{left:150%;}
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0;transform:scale(1.04);}
}
@keyframes dotPulse{
  0%,100%{opacity:0.4;box-shadow:0 0 6px rgba(212,180,132,0.2);}
  50%{opacity:1;box-shadow:0 0 14px rgba(212,180,132,0.5);}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo">Zestlie</div>
  <div class="nav-dot"></div>
</nav>

<!-- Main Scene -->
<div class="scene">

  <!-- Top ornament -->
  <div class="ornament">
    <div class="orn-line"></div>
    <div class="orn-text">Something is coming</div>
    <div class="orn-line r"></div>
  </div>

  <!-- Wordmark -->
  <div class="wordmark-clip">
    <span class="wordmark">Zestl<em>ie</em></span>
  </div>

  <!-- Tagline -->
  <div class="tagline-clip">
    <span class="tagline">crafted with intention · arriving soon</span>
  </div>

  <!-- Form -->
  <div class="form-shell">
    <div class="form-positioner">
      <div class="pulse-ring"></div>
      <div class="pulse-ring-2"></div>
      <div class="form-border" id="shell">
        <div class="form-inner">
          <input class="ei" id="ei" type="email"
            placeholder="your email address"
            autocomplete="email"/>
          <div class="form-divider"></div>
          <button class="nb" onclick="go()">
            <span>Notify me</span>
          </button>
        </div>
      </div>
    </div>
    <div class="ok" id="ok">You are on the list — we shall reach out.</div>
    <p class="hint">One message · No noise · Unsubscribe anytime</p>
  </div>

</div>

<!-- Bottom -->
<div class="bottom">
  <div class="bottom-line"></div>
  <div class="copyright">© 2025 Zestlie, Inc. · All rights reserved</div>
</div>

<script>
// ═══════════════════════════════════════════
// CANVAS — Luxury aurora + constellation
// ═══════════════════════════════════════════
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W, H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

let mx=W/2,my=H/2,tx=W/2,ty=H/2;
document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
document.addEventListener('touchmove',e=>{
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;
},{passive:true});

// Gold palette
const GOLD  = [212,180,132];
const ROSE  = [196,148,120];
const IVORY = [230,210,185];

// Particles
const N=70;
const pts=Array.from({length:N},()=>({
  x:Math.random()*1400-200,
  y:Math.random()*1000-100,
  vx:(Math.random()-0.5)*0.12,
  vy:(Math.random()-0.5)*0.12,
  r:Math.random()*0.9+0.2,
  col:Math.random()<0.6?GOLD:Math.random()<0.5?ROSE:IVORY,
  a:0.2+Math.random()*0.5,
}));

// Aurora bands — warm gold/amber/rose
const bands=Array.from({length:4},(_, i)=>({
  y:H*(0.15+i*0.22),
  vy:(Math.random()-0.5)*0.1,
  amp:50+Math.random()*70,
  freq:0.0012+Math.random()*0.0008,
  phase:Math.random()*Math.PI*2,
  ps:0.00025+Math.random()*0.0002,
  h:[32,42,20,50][i],   // warm amber/gold hues
  s:[60,55,45,65][i],
  l:[55,50,60,48][i],
  alpha:0.022+Math.random()*0.025,
}));

let t=0;
function draw(){
  t++;
  mx+=(tx-mx)*0.05;my+=(ty-my)*0.05;
  cx.clearRect(0,0,W,H);

  // aurora
  bands.forEach(b=>{
    b.phase+=b.ps;b.y+=b.vy;
    if(b.y<-80||b.y>H+80)b.vy*=-1;
    const g=cx.createLinearGradient(0,b.y-90,0,b.y+90);
    g.addColorStop(0,'transparent');
    g.addColorStop(0.5,`hsla(${b.h},${b.s}%,${b.l}%,${b.alpha})`);
    g.addColorStop(1,'transparent');
    cx.beginPath();cx.moveTo(0,b.y);
    for(let x=0;x<=W;x+=8){
      cx.lineTo(x,b.y+Math.sin(x*b.freq+b.phase)*b.amp);
    }
    cx.lineTo(W,b.y+180);cx.lineTo(0,b.y+180);
    cx.closePath();cx.fillStyle=g;cx.fill();
  });

  // constellation lines + dots
  for(let i=0;i<N;i++){
    const p=pts[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<-300)p.x=W+150;if(p.x>W+300)p.x=-150;
    if(p.y<-300)p.y=H+150;if(p.y>H+300)p.y=-150;
    // mouse repel
    const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy);
    if(d<160){const f=(160-d)/160*0.009;p.vx+=(dx/d)*f;p.vy+=(dy/d)*f;}
    const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(spd>0.4){p.vx*=0.96;p.vy*=0.96;}

    for(let j=i+1;j<N;j++){
      const q=pts[j];
      const ex=p.x-q.x,ey=p.y-q.y,ed=Math.sqrt(ex*ex+ey*ey);
      if(ed<140){
        const al=(1-ed/140)*0.065;
        cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);
        cx.strokeStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${al})`;
        cx.lineWidth=0.4;cx.stroke();
      }
    }

    // glowing dot
    const gr=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);
    gr.addColorStop(0,`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.a*0.8})`);
    gr.addColorStop(1,'transparent');
    cx.beginPath();cx.arc(p.x,p.y,p.r*4,0,Math.PI*2);
    cx.fillStyle=gr;cx.fill();
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.a})`;
    cx.fill();
  }

  // deep center vignette so text pops
  const vig=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.65);
  vig.addColorStop(0,'rgba(6,5,10,0.15)');
  vig.addColorStop(0.5,'rgba(6,5,10,0.3)');
  vig.addColorStop(1,'rgba(6,5,10,0.72)');
  cx.fillStyle=vig;cx.fillRect(0,0,W,H);

  requestAnimationFrame(draw);
}
draw();

// ═══════════════════════════════════════════
// FORMSPREE
// ═══════════════════════════════════════════
async function go(){
  const v=document.getElementById('ei').value.trim();
  if(!v||!v.includes('@')){
    const sh=document.getElementById('shell');
    sh.style.background='linear-gradient(135deg,rgba(220,80,80,0.5),rgba(220,80,80,0.1) 40%,rgba(220,80,80,0.1) 60%,rgba(220,80,80,0.4) 100%)';
    setTimeout(()=>sh.style.background='',1000);
    return;
  }
  const btn=document.querySelector('.nb span');
  btn.textContent='…';
  document.querySelector('.nb').disabled=true;
  try{
    const r=await fetch('https://formspree.io/f/mpqbpdab',{
      method:'POST',
      headers:{'Accept':'application/json','Content-Type':'application/json'},
      body:JSON.stringify({email:v})
    });
    if(r.ok){
      document.getElementById('shell').style.display='none';
      document.getElementById('ok').classList.add('show');
    } else {btn.textContent='Retry';}
  } catch{btn.textContent='Retry';}
}
document.getElementById('ei').addEventListener('keydown',e=>e.key==='Enter'&&go());
</script>
</body>
</html>
