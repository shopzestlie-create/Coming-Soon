<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zestlie | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  color: #e5e7eb;
  background: #0b0f1a;
}

/* animated gradient */
.bg {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 30%, #1e293b, transparent),
              radial-gradient(circle at 80% 70%, #312e81, transparent),
              radial-gradient(circle at 50% 50%, #0f172a, #020617);
  animation: moveBg 20s ease-in-out infinite alternate;
  z-index: -2;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  100% { transform: translate(-100px,-100px); }
}

/* floating blur blobs */
.blob {
  position: absolute;
  width: 300px;
  height: 300px;
  filter: blur(100px);
  opacity: 0.4;
  border-radius: 50%;
  animation: float 10s infinite alternate ease-in-out;
}

.blob1 { background: #6366f1; top: 10%; left: 20%; }
.blob2 { background: #22d3ee; bottom: 10%; right: 20%; }

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50px); }
}

/* main layout */
.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* brand */
h1 {
  font-size: 3rem;
  font-weight: 600;
  letter-spacing: 2px;
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
}

p {
  font-size: 1rem;
  opacity: 0.6;
  margin-bottom: 40px;
  animation: fadeIn 1.5s ease forwards;
}

/* email bar */
.form {
  display: flex;
  width: 100%;
  max-width: 420px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 999px;
  padding: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  animation: fadeIn 2s ease forwards;
}

.form input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  padding: 12px 15px;
  border-radius: 999px;
}

.form input::placeholder {
  color: rgba(255,255,255,0.4);
}

/* ios button */
.form button {
  border: none;
  padding: 10px 20px;
  border-radius: 999px;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.form button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(99,102,241,0.6);
}

/* footer */
.footer {
  position: absolute;
  bottom: 20px;
  font-size: 0.75rem;
  opacity: 0.4;
}

/* fade */
@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

/* mobile */
@media(max-width: 500px) {
  h1 { font-size: 2.2rem; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">
  <h1>Zestlie</h1>
  <p>Crafting something refined. Stay tuned.</p>

  <form class="form" action="https://formspree.io/f/mpqbpdab" method="POST">
    <input type="email" name="email" placeholder="Enter your email" required>
    <button type="submit">Notify</button>
  </form>
</div>

<div class="footer">
  © 2026 Zestlie. All rights reserved.
</div>

</body>
</html>
