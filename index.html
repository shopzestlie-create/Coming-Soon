<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zestlie — Arriving Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  height: 100dvh;
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617 70%);
  color: #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  position: relative;
}

/* ambient glow */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%);
  animation: float 10s ease-in-out infinite alternate;
}

@keyframes float {
  from { transform: translate(-80px, -60px); }
  to { transform: translate(80px, 60px); }
}

.container {
  width: 100%;
  max-width: 480px;
  text-align: center;
  z-index: 1;
}

h1 {
  font-size: clamp(2.2rem, 5vw, 3.2rem);
  font-weight: 600;
}

.tagline {
  margin-top: 10px;
  font-size: 0.95rem;
  color: #94a3b8;
  line-height: 1.5;
}

/* FORM */
.form {
  margin-top: 28px;
  display: flex;
  gap: 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding: 6px;
  transition: all 0.4s ease;
}

input {
  flex: 1;
  min-width: 0;
  padding: 12px 14px;
  border: none;
  background: transparent;
  color: white;
  font-size: 0.9rem;
  outline: none;
}

input::placeholder {
  color: #64748b;
}

button {
  flex-shrink: 0;
  white-space: nowrap;
  position: relative;
  padding: 12px 16px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-weight: 500;
  border-radius: 999px;
  overflow: hidden;
  transition: all 0.3s ease;
}

button:hover {
  box-shadow: 0 0 18px rgba(99,102,241,0.4);
}

/* ripple */
button::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
}

button:active::after {
  width: 180px;
  height: 180px;
  opacity: 1;
  transition: 0.4s;
}

/* loading */
.loading span {
  opacity: 0;
}

.loading::before {
  content: "";
  width: 14px;
  height: 14px;
  border: 2px solid white;
  border-top-color: transparent;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* SUCCESS STATE */
.success-state {
  margin-top: 30px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.6s ease;
}

.success-state.show {
  opacity: 1;
  transform: translateY(0);
}

.success-title {
  font-size: 1.2rem;
  margin-bottom: 8px;
}

.success-sub {
  font-size: 0.9rem;
  color: #94a3b8;
}

/* 📱 MOBILE FIX */
@media (max-width: 600px) {
  .form {
    flex-direction: column;
    border-radius: 16px;
    padding: 8px;
  }

  button {
    width: 100%;
    text-align: center;
  }
}

footer {
  position: absolute;
  bottom: 10px;
  font-size: 0.75rem;
  color: #64748b;
}
</style>
</head>

<body>

<div class="container">
  <h1>Zestlie</h1>

  <p class="tagline">
    Designed with intention. Built to feel effortless.
  </p>

  <form id="form" class="form" action="https://formspree.io/f/mpqbpdab" method="POST">
    <input type="email" name="email" placeholder="Your email address" required>
    <button id="btn"><span>Notify</span></button>
  </form>

  <div id="successState" class="success-state">
    <div class="success-title">You're in.</div>
    <div class="success-sub">We’ll reach out when Zestlie is ready.</div>
  </div>
</div>

<footer>
  © 2026 Zestlie — Crafted with intent.
</footer>

<script>
const form = document.getElementById('form');
const btn = document.getElementById('btn');
const successState = document.getElementById('successState');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  btn.classList.add('loading');

  const data = new FormData(form);

  try {
    const res = await fetch(form.action, {
      method: form.method,
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    if (res.ok) {
      btn.classList.remove('loading');

      form.style.opacity = "0";
      form.style.transform = "translateY(-10px)";

      setTimeout(() => {
        form.style.display = "none";
        successState.classList.add('show');
      }, 400);

    } else {
      throw new Error();
    }

  } catch {
    btn.classList.remove('loading');
    btn.innerHTML = "<span>Try Again</span>";
  }
});
</script>

</body>
</html>
