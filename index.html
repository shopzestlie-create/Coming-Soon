<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zestlie — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

    body {
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      overflow:hidden;
      background:#020617;
    }

    /* Clean modern gradient motion */
    .bg-gradient {
      position:absolute;
      inset:-50%;
      background: linear-gradient(120deg, #38bdf8, #6366f1, #22d3ee);
      background-size: 300% 300%;
      filter: blur(120px);
      opacity:0.35;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Subtle animated grid (much cleaner than bubbles) */
    .grid {
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black, transparent 75%);
      animation: gridMove 25s linear infinite;
      opacity:0.4;
    }

    @keyframes gridMove {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }

    /* Cursor glow (kept because it's good UX) */
    .cursor-glow {
      position:absolute;
      width:420px;
      height:420px;
      background: radial-gradient(circle, rgba(56,189,248,0.18), transparent 60%);
      pointer-events:none;
      transform: translate(-50%, -50%);
      z-index:1;
    }

    .container {
      position:relative;
      text-align:center;
      max-width:700px;
      padding:40px 20px;
      z-index:2;
    }

    .logo {
      font-size:1.2rem;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#38bdf8;
      margin-bottom:20px;
    }

    h1 {
      font-size:3.5rem;
      font-weight:700;
      margin-bottom:15px;
      background: linear-gradient(90deg,#38bdf8,#818cf8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    p {
      color:#cbd5f5;
      font-size:1.1rem;
      margin-bottom:35px;
    }

    .email-box {
      display:flex;
      justify-content:center;
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:50px;
      padding:5px;
      max-width:420px;
      margin:0 auto;
      transition:0.3s;
    }

    .email-box:hover {
      box-shadow: 0 0 25px rgba(56,189,248,0.3);
      transform: scale(1.02);
    }

    input {
      flex:1;
      padding:14px 18px;
      border:none;
      outline:none;
      background:transparent;
      color:white;
      font-size:0.95rem;
    }

    button {
      padding:12px 20px;
      border:none;
      border-radius:40px;
      background: linear-gradient(90deg,#38bdf8,#6366f1);
      color:white;
      font-weight:600;
      cursor:pointer;
      transition: all 0.25s ease;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(56,189,248,0.6);
    }

    .success-message {
      display:none;
      margin-top:20px;
      color:#38bdf8;
      font-size:0.95rem;
    }

    .footer {
      margin-top:50px;
      font-size:0.9rem;
      color:#94a3b8;
      line-height:1.6;
      letter-spacing:0.5px;
    }

    @media (max-width:500px) {
      h1 { font-size:2.4rem; }
      .email-box { flex-direction:column; }
      button { width:100%; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="grid"></div>
  <div class="cursor-glow" id="glow"></div>

  <div class="container">
    <div class="logo">ZESTLIE</div>
    <h1>Something Fresh is Coming</h1>
    <p>Stay for a second… something cool is happening 👀</p>

    <form class="email-box" id="form">
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit">Notify Me</button>
    </form>

    <div class="success-message" id="successMsg">🚀 You're on the list!</div>

    <div class="footer">
      © <span id="year"></span> Zestlie. All rights reserved.
    </div>
  </div>

  <script>
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });

    const form = document.getElementById('form');
    const successMsg = document.getElementById('successMsg');
    const year = document.getElementById('year');

    year.textContent = new Date().getFullYear();

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);

      try {
        const response = await fetch('https://formspree.io/f/mpqbpdab', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.style.display = 'none';
          successMsg.style.display = 'block';
        } else {
          alert('Try again');
        }
      } catch (error) {
        alert('Error');
      }
    });
  </script>
</body>
</html>
